<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DB Designer</title>
    <script>
      // 启动前同步读取主题，避免 splash 闪一下
      (function () {
        try {
          if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('app-dark');
          }
        } catch (e) {}
      })();
    </script>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        color: #1f1f1f;
        transition: opacity 0.25s ease, visibility 0.25s ease;
      }
      html.app-dark #app-splash {
        background: #141414;
        color: rgba(255, 255, 255, 0.85);
      }
      #app-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
      }
      #app-splash .splash-logo {
        width: 64px;
        height: 64px;
        margin-bottom: 16px;
        color: #1890ff;
      }
      #app-splash .splash-title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin-bottom: 24px;
      }
      #app-splash .splash-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(24, 144, 255, 0.2);
        border-top-color: #1890ff;
        border-radius: 50%;
        animation: splash-spin 0.9s linear infinite;
      }
      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <svg
        class="splash-logo"
        viewBox="0 0 64 64"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <ellipse cx="32" cy="14" rx="22" ry="8" stroke="currentColor" stroke-width="3" />
        <path
          d="M10 14v18c0 4.4 9.85 8 22 8s22-3.6 22-8V14"
          stroke="currentColor"
          stroke-width="3"
        />
        <path
          d="M10 32v18c0 4.4 9.85 8 22 8s22-3.6 22-8V32"
          stroke="currentColor"
          stroke-width="3"
        />
      </svg>
      <div class="splash-title">DB Designer</div>
      <div class="splash-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
